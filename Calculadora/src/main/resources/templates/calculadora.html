<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Calculadora</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
    <h1>Calculadora MVC</h1>

    <form th:action="@{/calculadora}" th:object="${form}" method="post">
        <label>Número A</label>
        <input type="number" step="any" th:field="*{numeroA}">
        <span th:if="${#fields.hasErrors('numeroA')}" th:errors="*{numeroA}" class="error"></span>

        <label>Número B</label>
        <input type="number" step="any" th:field="*{numeroB}">
        <span th:if="${#fields.hasErrors('numeroB')}" th:errors="*{numeroB}" class="error"></span>

        <label>Operación</label>
        <select th:field="*{operacion}">
            <option value="">-- Elige --</option>
            <option value="suma">Suma</option>
            <option value="resta">Resta</option>
            <option value="multiplicacion">Multiplicación</option>
            <option value="division">División</option>
        </select>
        <span th:if="${#fields.hasErrors('operacion')}" th:errors="*{operacion}" class="error"></span>

        <button type="submit">Calcular</button>
    </form>

    <div th:if="${resultado}" class="resultado">
        <p th:if="${resultado.error == null}">Resultado: <strong th:text="${resultado.resultado}"></strong></p>
        <p th:if="${resultado.error != null}" class="error" th:text="${resultado.error}"></p>
    </div>

    <h2>Historial</h2>
    <table th:if="${!#lists.isEmpty(historial)}">
        <tr><th>#</th><th>A</th><th>B</th><th>Operación</th><th>Resultado</th></tr>
        <tr th:each="op : ${historial}">
            <td th:text="${op.id}"></td>
            <td th:text="${op.numeroA}"></td>
            <td th:text="${op.numeroB}"></td>
            <td th:text="${op.tipo}"></td>
            <td th:text="${op.error != null ? op.error : op.resultado}"></td>
        </tr>
    </table>
    <p th:if="${#lists.isEmpty(historial)}">Sin operaciones aún.</p>
</body>
</html>
